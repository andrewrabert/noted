name: Release

on:
  push:
    tags: ["v*"]

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get tag annotation
        id: tag-msg
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          ref_json=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")
          tag_sha=$(echo "$ref_json" | jq -r '.object.sha')
          tag_msg=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.message')
          echo "msg<<TAGEOF" >> "$GITHUB_OUTPUT"
          echo "$tag_msg" >> "$GITHUB_OUTPUT"
          echo "TAGEOF" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          TAG_MSG: ${{ steps.tag-msg.outputs.msg }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="$TAG" \
            -f name="$TAG" \
            -f body="$TAG_MSG" \
            -F draft=true \
            -F prerelease=false

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            sudo apt-get install -y musl-tools
          fi
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi
      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build with cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}
      - name: Build with cargo
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: tar czf noted-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release noted
      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/noted.exe -DestinationPath noted-${{ matrix.target }}.zip
      - name: Upload artifact to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" noted-*.tar.gz noted-*.zip 2>/dev/null || gh release upload "$TAG" noted-*.zip 2>/dev/null || gh release upload "$TAG" noted-*.tar.gz

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest=false
